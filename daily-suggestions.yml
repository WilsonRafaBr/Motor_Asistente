name: Motor de Sugerencias Diario

on:
  schedule:
    # 09:50 UTC = 04:50 AM en Ecuador (America/Guayaquil, UTC-5)
    - cron: '50 9 * * *'
  workflow_dispatch:
  
jobs:
  run-motor:
    runs-on: ubuntu-latest
    
    # Esta configuración elimina el error de "Node.js 20 está obsoleto"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Instalar dependencias
      run: |
        pip install -r requirements.txt

    - name: Validar secrets de Google Calendar
      env:
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
      run: |
        python - <<'PY'
        import json, os, sys
        calendar_id = (os.environ.get("GOOGLE_CALENDAR_ID") or "").strip()
        creds_raw = (os.environ.get("GOOGLE_CREDENTIALS_JSON") or "").strip()
        if not calendar_id:
            print("ERROR: GOOGLE_CALENDAR_ID no esta definido en GitHub Secrets.")
            sys.exit(1)
        if not creds_raw:
            print("ERROR: GOOGLE_CREDENTIALS_JSON no esta definido en GitHub Secrets.")
            sys.exit(1)
        try:
            creds = json.loads(creds_raw)
        except Exception as exc:
            print(f"ERROR: GOOGLE_CREDENTIALS_JSON no es JSON valido: {exc}")
            sys.exit(1)
        client_email = creds.get("client_email")
        if not client_email:
            print("ERROR: GOOGLE_CREDENTIALS_JSON no contiene client_email.")
            sys.exit(1)
        print("OK: Secrets de Google Calendar presentes.")
        print(f"OK: GOOGLE_CALENDAR_ID configurado (longitud={len(calendar_id)}).")
        print(f"OK: Service account detectada: {client_email}.")
        PY
    
    - name: Ejecutar Asistente
      env:
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        NOTION_OUTPUT_PAGE_ID: ${{ secrets.NOTION_OUTPUT_PAGE_ID }}
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
        GOOGLE_CALENDAR_IDS: ${{ secrets.GOOGLE_CALENDAR_ID }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
        TIMEZONE: ${{ secrets.TIMEZONE }}
      run: |
        python asistente.py

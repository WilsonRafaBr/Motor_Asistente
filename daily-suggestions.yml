name: Motor de Sugerencias Diario

on:
  schedule:
    # 09:50 UTC = 04:50 AM en Ecuador (America/Guayaquil, UTC-5)
    - cron: '50 9 * * *'
  workflow_dispatch:
  
jobs:
  run-motor:
    runs-on: ubuntu-latest
    
    # Esta configuración elimina el error de "Node.js 20 está obsoleto"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Instalar dependencias
      run: |
        pip install -r requirements.txt
    
    - name: Ejecutar Asistente
      env:
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        NOTION_OUTPUT_PAGE_ID: ${{ secrets.NOTION_OUTPUT_PAGE_ID }}
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
        TIMEZONE: ${{ secrets.TIMEZONE }}
      run: |
        python asistente.py

name: 🤖 Asistente - Motor de Productividad Diario

on:
  schedule:
    # 09:50 UTC = 04:50 AM Ecuador (UTC-5)
    # Ejecuta 10 minutos antes para asegurar que el email llegue a las 05:00 AM
    - cron: '50 9 * * *'
  
  # Permite ejecución manual desde GitHub Actions
  workflow_dispatch:

jobs:
  run-asistente:
    name: Ejecutar Asistente
    runs-on: ubuntu-latest
    
    # Configuración de entorno
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONUNBUFFERED: 1

    steps:
    # 1. Descargar el código del repositorio
    - name: Checkout código
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    # 2. Configurar Python 3.11
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    # 3. Instalar dependencias
    - name: Instalar dependencias Python
      run: |
        python -m pip install --upgrade pip
        pip install requests google-auth-oauthlib google-api-python-client python-dotenv

    - name: Validar secrets de Google Calendar
      env:
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
      run: |
        python - <<'PY'
        import json, os, sys
        calendar_id = (os.environ.get("GOOGLE_CALENDAR_ID") or "").strip()
        creds_raw = (os.environ.get("GOOGLE_CREDENTIALS_JSON") or "").strip()
        if not calendar_id:
            print("ERROR: GOOGLE_CALENDAR_ID no esta definido en GitHub Secrets.")
            sys.exit(1)
        if not creds_raw:
            print("ERROR: GOOGLE_CREDENTIALS_JSON no esta definido en GitHub Secrets.")
            sys.exit(1)
        try:
            creds = json.loads(creds_raw)
        except Exception as exc:
            print(f"ERROR: GOOGLE_CREDENTIALS_JSON no es JSON valido: {exc}")
            sys.exit(1)
        client_email = creds.get("client_email")
        if not client_email:
            print("ERROR: GOOGLE_CREDENTIALS_JSON no contiene client_email.")
            sys.exit(1)
        print("OK: Secrets de Google Calendar presentes.")
        print(f"OK: GOOGLE_CALENDAR_ID configurado (longitud={len(calendar_id)}).")
        print(f"OK: Service account detectada: {client_email}.")
        PY

    # 4. Crear directorio para logs (opcional)
    - name: Crear directorio de logs
      run: mkdir -p logs

    # 5. Ejecutar Asistente
    - name: Ejecutar Asistente
      env:
        # Variables de entorno desde GitHub Secrets
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
        GOOGLE_CALENDAR_IDS: ${{ secrets.GOOGLE_CALENDAR_ID }}
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        NOTION_OUTPUT_PAGE_ID: ${{ secrets.NOTION_OUTPUT_PAGE_ID }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
      run: python asistente.py

    # 6. Capturar logs en caso de error
    - name: Capturar logs si hay error
      if: failure()
      run: |
        echo "❌ Asistente falló. Revisa el output arriba."
        exit 1

    # 7. Notificar éxito
    - name: Notificar éxito
      if: success()
      run: echo "✅ Asistente ejecutado exitosamente a $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
